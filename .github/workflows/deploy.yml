name: Deploy Vapor Server Root

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vapor-server-root-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger VPS deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        shell: bash
        env:
          VAPOR_DEPLOY_HOST: ${{ secrets.VAPOR_DEPLOY_HOST }}
          VAPOR_DEPLOY_USER: ${{ secrets.VAPOR_DEPLOY_USER }}
          VAPOR_DEPLOY_SSH_KEY: ${{ secrets.VAPOR_DEPLOY_SSH_KEY }}
          VAPOR_DEPLOY_KNOWN_HOSTS: ${{ secrets.VAPOR_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          missing=0
          for name in VAPOR_DEPLOY_HOST VAPOR_DEPLOY_USER VAPOR_DEPLOY_SSH_KEY VAPOR_DEPLOY_KNOWN_HOSTS; do
            if [ -z "${!name}" ]; then
              echo "::error::missing required secret ${name}"
              missing=1
            fi
          done
          exit "${missing}"

      - name: Configure SSH
        shell: bash
        env:
          VAPOR_DEPLOY_SSH_KEY: ${{ secrets.VAPOR_DEPLOY_SSH_KEY }}
          VAPOR_DEPLOY_KNOWN_HOSTS: ${{ secrets.VAPOR_DEPLOY_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.ssh"
          printf '%s\n' "${VAPOR_DEPLOY_SSH_KEY}" > "${HOME}/.ssh/vapor_deploy"
          chmod 0600 "${HOME}/.ssh/vapor_deploy"
          printf '%s\n' "${VAPOR_DEPLOY_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 0600 "${HOME}/.ssh/known_hosts"

      - name: Trigger deploy service
        shell: bash
        env:
          VAPOR_DEPLOY_HOST: ${{ secrets.VAPOR_DEPLOY_HOST }}
          VAPOR_DEPLOY_USER: ${{ secrets.VAPOR_DEPLOY_USER }}
        run: |
          set -euo pipefail
          ssh \
            -i "${HOME}/.ssh/vapor_deploy" \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            "${VAPOR_DEPLOY_USER}@${VAPOR_DEPLOY_HOST}" \
            'sudo -n /usr/bin/systemctl start vapor-deploy.service'
